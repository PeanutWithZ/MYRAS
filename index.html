<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malaysia Robotics, AI & Automation Association</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/icons/alpha.png" />

    <!-- SEO -->
    <meta
      name="description"
      content="Malaysia's first and pioneering professional organisation in Robotics, AI & Automation. Established 2017."
    />
    <meta
      property="og:title"
      content="MYRAS — Malaysia Robotics, AI & Automation Association"
    />
    <!-- <meta property="og:image" content="assets/images/og-image.jpg" /> -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Project CSS (must come after Bootstrap so overrides work) -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>

    <div data-partial="announcement"></div>
    <div data-partial="navbar"></div>
    <div data-partial="hero"></div>
    <div data-partial="about"></div>
    <div data-partial="affiliations"></div>
    <div data-partial="leadership"></div>
    <div data-partial="services"></div>
    <div data-partial="events"></div>
    <div data-partial="membership"></div>
    <div data-partial="gallery"></div>
    <div data-partial="contact"></div>
    <div data-partial="footer"></div>

    <!-- Bootstrap JS (required for mobile nav collapse) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Partials loader (must come before main.js and form.js) -->
    <script src="js/partials.js"></script>

    <!-- Project JS -->
    <script src="js/main.js" defer></script>
    <script src="js/form.js" defer></script>
  </body>
</html>
